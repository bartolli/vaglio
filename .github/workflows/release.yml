name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # REQUIRED for npm OIDC trusted publishing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm   # match the env name configured in npm Trusted Publisher UI
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Activate pnpm via Corepack
        run: corepack enable

      # Node 24 bundles npm 11.x ⇒ TP exchange native, no separate npm upgrade.
      # CI matrix in ci.yml still tests both 22 + 24 for consumer compatibility.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm run publint
      - run: pnpm run attw

      # No env: NODE_AUTH_TOKEN even empty breaks OIDC.
      # `--loglevel=verbose` + .npmrc dump discriminate TP-binding mismatch from
      # token-auth fallthrough (both surface as 404). Strip after first green publish.
      - name: Publish to npm (OIDC trusted publisher)
        run: |
          cat ~/.npmrc 2>/dev/null || echo "(no ~/.npmrc — OIDC-only path)"
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "Pre-release tag detected: $GITHUB_REF_NAME ⇒ publishing with --tag rc"
            npm publish --access public --provenance --tag rc --loglevel=verbose
          else
            echo "GA tag: $GITHUB_REF_NAME ⇒ publishing as @latest"
            npm publish --access public --provenance --loglevel=verbose
          fi
