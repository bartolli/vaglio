name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # REQUIRED for npm OIDC trusted publishing

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm   # match the env name configured in npm Trusted Publisher UI
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Activate pnpm via Corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm run publint
      - run: pnpm run attw

      # npm OIDC requires CLI >= 11.5.1; Node 22 LTS ships npm 10.x.
      - name: Upgrade npm
        run: npm install -g npm@latest

      # NO env: section. NODE_AUTH_TOKEN even when empty breaks OIDC.
      # Pre-release tags (v*-rc*, v*-beta*, etc.) publish under --tag rc to keep
      # @latest empty until GA. Bare publish defaults to @latest ⇒ npm install vaglio
      # would resolve to a pre-release. Detection: any '-' in the tag name ⇒ pre-release.
      - name: Publish to npm (OIDC trusted publisher)
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "Pre-release tag detected: $GITHUB_REF_NAME ⇒ publishing with --tag rc"
            npm publish --access public --provenance --tag rc
          else
            echo "GA tag: $GITHUB_REF_NAME ⇒ publishing as @latest"
            npm publish --access public --provenance
          fi
